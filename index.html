<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projekt Todo</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

<header class="header">
  <h1>Projekt Todo</h1>
  <p>Checklista för gruppuppgiften</p>
</header>

<main class="container">
  <section class="card">

    <div class="row">
      <button id="seedTemplateBtn">Lägg in mall (G/VG)</button>
    </div>

    <form id="todoForm" class="row">
      <input id="todoInput" type="text" placeholder="Ny uppgift..." required />
      <button type="submit">Lägg till</button>
    </form>

    <div class="row controls">
      <input id="searchInput" type="search" placeholder="Sök..." />
      <select id="filterSelect">
        <option value="all">Alla</option>
        <option value="active">Ej klara</option>
        <option value="done">Klara</option>
      </select>
      <button id="clearDoneBtn" type="button">Rensa klara</button>
    </div>

    <ul id="todoList" class="list"></ul>

    <footer class="footer">
      <span id="stats"></span>
      <button id="clearAllBtn" class="danger">Rensa allt</button>
    </footer>

  </section>
</main>

<script type="module" src="./js/app.js"></script>
</body>
</html>
